</style></head><body>
<div class="header">
  <h1><button class="hamburger" id="hamburger-btn" onclick="toggleSidebar()">&#9776;</button><span class="icon">T</span> dbt Test Reviewer <span id="header-context" style="font-size:12px;font-weight:400;color:var(--txm)"></span></h1>
  <div style="display:flex;align-items:center;gap:6px">
    <div style="font-size:12px;color:var(--txd)" id="status-indicator"></div>
    <button class="theme-toggle" onclick="toggleSidebarCollapse()" title="Toggle sidebar (b)">&#9776;</button>
    <button class="theme-toggle" onclick="var rp=document.getElementById('right-panel');if(rp.classList.contains('open')){closeRightPanel()}else{var f=Object.keys(DATA.cteResults||{})[0];if(f){openCTEPanel(f)}else{var s=Object.keys(DATA.fileContents||{})[0];if(s)openSourcePanel(s)}}" title="Toggle right panel (e)">&#9707;</button>
    <button class="theme-toggle" onclick="var h=document.getElementById('kbd-help');h.style.display=h.style.display==='none'?'block':'none'" title="Keyboard shortcuts (?)">&#63;</button>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">&#9790;</button>
  </div>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="sidebar-resize" id="sidebar-resize"></div>
  <div class="main" id="app"></div>
  <div class="panel-resize" id="panel-resize"></div>
  <div class="right-panel" id="right-panel"></div>
</div>
<div id="kbd-help" class="kbd-help" style="display:none">
<kbd>j</kbd> / <kbd>k</kbd> Navigate cards<br>
<kbd>1</kbd> OK &middot; <kbd>2</kbd> Needs Change &middot; <kbd>3</kbd> Pending<br>
<kbd>b</kbd> Toggle sidebar &middot; <kbd>e</kbd> Toggle CTE panel<br>
<kbd>?</kbd> or <kbd>/</kbd> Toggle this help
</div>
<script>
const POLL_INTERVAL = 2000;
let DATA = <!-- DATA_PLACEHOLDER -->;
let reviews = {}, comments = {}, filter = 'all', openSections = {}, selectedFile = null;

function reviewKey(t) {
  if (t.type === 'schema' && t.column !== '(model-level)') return 'col:' + t.model + ':' + t.column;
  return t.type + ':' + t.name + ':' + (t.model || '');
}

function getFileList(tests) {
  const fileMap = {};
  tests.forEach(t => {
    if (!t.sourceFile) return;
    if (!fileMap[t.sourceFile]) fileMap[t.sourceFile] = [];
    fileMap[t.sourceFile].push(t);
  });
  return Object.entries(fileMap)
    .map(([path, tests]) => {
      const parts = path.split('/');
      const name = parts.pop();
      const dir = parts.join('/');
      return { path, name, dir, tests };
    })
    .sort((a, b) => a.path.localeCompare(b.path));
}

function getFileReviewStatus(tests) {
  if (!tests || !tests.length) return null;
  const statuses = new Set();
  tests.forEach(t => {
    const k = reviewKey(t);
    statuses.add(reviews[k] || 'pending');
  });
  if (statuses.has('needs_change')) return 'needs_change';
  if (statuses.has('pending')) return 'pending';
  return 'approved';
}

function getSemanticFileReviewStatus(smList) {
  if (!smList || !smList.length) return null;
  const statuses = new Set();
  smList.forEach(sm => {
    const k = 'semantic:' + sm.name + ':' + sm.modelRef;
    statuses.add(reviews[k] || 'pending');
  });
  if (statuses.has('needs_change')) return 'needs_change';
  if (statuses.has('pending')) return 'pending';
  return 'approved';
}

function getSemanticFiles() {
  const smFiles = {};
  (DATA.semanticModels || []).forEach(sm => {
    if (!sm.sourceFile) return;
    if (!smFiles[sm.sourceFile]) smFiles[sm.sourceFile] = { models: [], metrics: [] };
    smFiles[sm.sourceFile].models.push(sm);
  });
  (DATA.metrics || []).forEach(mt => {
    if (!mt.sourceFile) return;
    if (!smFiles[mt.sourceFile]) smFiles[mt.sourceFile] = { models: [], metrics: [] };
    smFiles[mt.sourceFile].metrics.push(mt);
  });
  return smFiles;
}

function renderSidebar() {
  const tests = DATA.allTests;
  const files = getFileList(tests);
  const totalTests = tests.length;
  const smFiles = getSemanticFiles();
  const testPaths = new Set(files.map(f => f.path));
  const semanticFileEntries = Object.entries(smFiles)
    .filter(([path]) => !testPaths.has(path))
    .sort(([a], [b]) => a.localeCompare(b));
  const semanticItemCount = semanticFileEntries.reduce((sum, [, v]) => sum + v.models.length, 0);

  let h = '<div style="position:relative">';
  h += '<button class="sidebar-close" onclick="toggleSidebar()">\u2715</button>';
  h += '<div class="sidebar-header"><span class="sidebar-title">Files</span></div>';
  h += '<div class="sidebar-all' + (!selectedFile ? ' active' : '') + '" onclick="selectFile(null)">';
  h += '<span>All Files</span>';
  h += '<span class="sidebar-count">' + (totalTests + semanticItemCount) + '</span>';
  h += '</div>';
  h += '<div class="sidebar-sep"></div>';
  for (const file of files) {
    const ext = file.name.split('.').pop()?.toLowerCase();
    const extLabel = ext === 'yml' || ext === 'yaml' ? 'Y' : ext === 'sql' ? 'S' : '?';
    const extColor = ext === 'sql' ? 'var(--or)' : 'var(--pu)';
    const extBg = ext === 'sql' ? 'var(--orb)' : 'var(--pub)';
    const count = file.tests.length;
    const status = getFileReviewStatus(file.tests);
    const isActive = selectedFile === file.path;
    const dotColor = status === 'approved' ? 'var(--ac)' : status === 'needs_change' ? 'var(--rd)' : status === 'pending' ? 'var(--or)' : '';
    h += '<div class="sidebar-file' + (isActive ? ' active' : '') + '" onclick="selectFile(' + jsStr(file.path) + ')">';
    h += '<div class="sidebar-file-info">';
    if (file.dir) h += '<div class="sidebar-file-path">' + esc(file.dir) + '</div>';
    h += '<div class="sidebar-file-name">';
    h += '<span class="sidebar-file-ext" style="color:' + extColor + ';background:' + extBg + '">' + extLabel + '</span>';
    h += esc(file.name);
    h += '</div></div>';
    h += '<div class="sidebar-right">';
    if (dotColor) h += '<span class="sidebar-dot" style="background:' + dotColor + '"></span>';
    h += '<span class="sidebar-count">' + count + '</span>';
    h += '</div></div>';
    // Per-file progress bar
    const fileKeys = new Set();
    file.tests.forEach(t => fileKeys.add(reviewKey(t)));
    let fApproved = 0, fNeedsChange = 0;
    fileKeys.forEach(k => {
      if (reviews[k] === 'approved') fApproved++;
      else if (reviews[k] === 'needs_change') fNeedsChange++;
    });
    const fTotal = fileKeys.size;
    if (fTotal > 0 && (fApproved > 0 || fNeedsChange > 0)) {
      h += '<div class="sidebar-progress" style="margin:0 12px">';
      h += '<div style="width:' + (fApproved / fTotal * 100) + '%;background:var(--ac)"></div>';
      h += '<div style="width:' + (fNeedsChange / fTotal * 100) + '%;background:var(--rd)"></div>';
      h += '</div>';
    }
  }
  // Semantic YAML files (not already in test files)
  if (semanticFileEntries.length > 0) {
    h += '<div class="sidebar-sep"></div>';
    for (const [path, smData] of semanticFileEntries) {
      const parts = path.split('/');
      const name = parts.pop();
      const dir = parts.join('/');
      const count = smData.models.length;
      const status = getSemanticFileReviewStatus(smData.models);
      const isActive = selectedFile === path;
      const dotColor = status === 'approved' ? 'var(--ac)' : status === 'needs_change' ? 'var(--rd)' : status === 'pending' ? 'var(--or)' : '';
      h += '<div class="sidebar-file' + (isActive ? ' active' : '') + '" onclick="selectFile(' + jsStr(path) + ')">';
      h += '<div class="sidebar-file-info">';
      if (dir) h += '<div class="sidebar-file-path">' + esc(dir) + '</div>';
      h += '<div class="sidebar-file-name">';
      h += '<span class="sidebar-file-ext" style="color:var(--cy);background:var(--cyb)">SM</span>';
      h += esc(name);
      h += '</div></div>';
      h += '<div class="sidebar-right">';
      if (dotColor) h += '<span class="sidebar-dot" style="background:' + dotColor + '"></span>';
      h += '<span class="sidebar-count">' + count + '</span>';
      h += '</div></div>';
      // Per-file progress bar for semantic files
      const smKeys = smData.models.map(sm => 'semantic:' + sm.name + ':' + sm.modelRef);
      let fApproved = 0, fNeedsChange = 0;
      smKeys.forEach(k => {
        if (reviews[k] === 'approved') fApproved++;
        else if (reviews[k] === 'needs_change') fNeedsChange++;
      });
      const fTotal = smKeys.length;
      if (fTotal > 0 && (fApproved > 0 || fNeedsChange > 0)) {
        h += '<div class="sidebar-progress" style="margin:0 12px">';
        h += '<div style="width:' + (fApproved / fTotal * 100) + '%;background:var(--ac)"></div>';
        h += '<div style="width:' + (fNeedsChange / fTotal * 100) + '%;background:var(--rd)"></div>';
        h += '</div>';
      }
    }
  }
  h += '</div>';
  document.getElementById('sidebar').innerHTML = h;
}

window.openSourcePanel = function(file, targetLine) {
  const raw = (DATA.fileContents || {})[file];
  if (!raw) return;
  const ext = file.split('.').pop()?.toLowerCase();
  const isSql = ext === 'sql';
  const lines = raw.split('\n');
  let body = '<div class="source-lines" style="margin:0;padding:8px 0;font-family:var(--fn);font-size:12px;line-height:1.7;overflow-x:auto">';
  for (let i = 0; i < lines.length; i++) {
    const ln = i + 1;
    const isTarget = ln === targetLine;
    const highlighted = isSql ? highlightSQL(lines[i]) : highlightYAML(lines[i]);
    body += '<div id="src-line-' + ln + '" style="display:flex;' + (isTarget ? 'background:var(--orb);' : '') + '">';
    body += '<span style="min-width:40px;padding:0 8px;text-align:right;color:' + (isTarget ? 'var(--or)' : 'var(--txm)') + ';user-select:none;flex-shrink:0;font-size:11px">' + ln + '</span>';
    body += '<span style="flex:1;padding-right:12px;white-space:pre-wrap">' + (highlighted || ' ') + '</span>';
    body += '</div>';
  }
  body += '</div>';
  const badge = isSql
    ? '<span class="badge" style="color:var(--or);background:var(--orb)">SQL</span>'
    : '<span class="badge" style="color:var(--pu);background:var(--pub)">YAML</span>';
  const lineInfo = targetLine ? '<span style="font-size:10px;color:var(--or);flex-shrink:0">L' + targetLine + '</span>' : '';
  const header = badge +
    '<span style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(file.split('/').pop()) + '</span>' + lineInfo;
  openRightPanel(header, body);
  if (targetLine) {
    setTimeout(function() {
      const el = document.getElementById('src-line-' + targetLine);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  }
};

  if (ctx) {
