function initReviewKeys(data) {
  data.allTests.forEach(t => {
    const k = reviewKey(t);
    if (!reviews[k]) { reviews[k] = 'pending'; comments[k] = ''; }
  });
  if (data.coverageData) {
    data.coverageData.forEach(cov => {
      cov.columns.filter(c => c.status === 'untested' || c.status === 'excluded').forEach(c => {
        const k = 'col:' + cov.model + ':' + c.name;
        if (!reviews[k]) { reviews[k] = 'pending'; comments[k] = ''; }
      });
    });
  }
  if (data.semanticModels) {
    data.semanticModels.forEach(sm => {
      const k = 'semantic:' + sm.name + ':' + sm.modelRef;
      if (!reviews[k]) { reviews[k] = 'pending'; comments[k] = ''; }
    });
  }
}

let pollFailCount = 0;
async function poll() {
  if (DATA.demoMode) return;
  try {
    const r = await fetch('/api/data');
    if (!r.ok) throw new Error('Server returned ' + r.status);
    const d = await r.json();
    if (pollFailCount > 0) {
      pollFailCount = 0;
      const si = document.getElementById('status-indicator');
      if (si) si.innerHTML = '<span class="live-dot"></span>Live \u2014 Auto-refreshes on file changes';
    }
    if (JSON.stringify(d) !== JSON.stringify(DATA)) {
      DATA = d;
      initReviewKeys(DATA);
      render(); renderSidebar();
    }
  } catch (e) {
    pollFailCount++;
    console.warn('Poll failed:', e.message);
    if (pollFailCount >= 3) {
      const si = document.getElementById('status-indicator');
      if (si) si.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--rd);margin-right:6px"></span>Disconnected \u2014 Server unreachable';
    }
  }
  setTimeout(poll, POLL_INTERVAL);
}

// --- CTE DAG Graph ---
function layoutCTEGraph(parsed) {
  var ctes = parsed.ctes, finalSelect = parsed.finalSelect, finalDeps = parsed.finalDeps;
  if (!ctes.length) return { nodes: [], edges: [], layerCount: 0 };
  var allExt = new Set();
  for (var i = 0; i < ctes.length; i++) (ctes[i].externalRefs || []).forEach(function(r) { allExt.add(r); });
  var nodes = [], nodeMap = {};
  allExt.forEach(function(r) {
    var id = 'ref:' + r;
    var n = { id: id, label: r, type: 'source', layer: 0, col: 0, colCount: 1, body: null };
    nodes.push(n); nodeMap[id] = n;
  });
  for (var i = 0; i < ctes.length; i++) {
    var c = ctes[i];
    var id = 'cte:' + c.name.toLowerCase();
    var n = { id: id, label: c.name, type: 'cte', layer: -1, col: 0, colCount: 1, body: c.body, deps: c.deps || [], externalRefs: c.externalRefs || [] };
    nodes.push(n); nodeMap[id] = n;
  }
  var finalNode = { id: 'final', label: 'SELECT', type: 'final', layer: -1, col: 0, colCount: 1, body: finalSelect, deps: finalDeps || [] };
  nodes.push(finalNode); nodeMap['final'] = finalNode;
  function asgn(nid, vis) {
    vis = vis || new Set();
    var n = nodeMap[nid]; if (!n || n.layer >= 0) return n ? n.layer : 0;
    if (vis.has(nid)) return 0; vis.add(nid);
    var mx = 0;
    if (n.type === 'cte') {
      for (var j = 0; j < n.deps.length; j++) mx = Math.max(mx, asgn('cte:' + n.deps[j], vis) + 1);
      if (n.externalRefs && n.externalRefs.length) mx = Math.max(mx, 1);
    }
    if (n.type === 'final') { for (var j = 0; j < n.deps.length; j++) mx = Math.max(mx, asgn('cte:' + n.deps[j], vis) + 1); }
    n.layer = n.type === 'source' ? 0 : mx;
    return n.layer;
  }
  for (var i = 0; i < nodes.length; i++) asgn(nodes[i].id);
  var maxL = 0;
  for (var i = 0; i < nodes.length; i++) { if (nodes[i].type !== 'final' && nodes[i].layer > maxL) maxL = nodes[i].layer; }
  finalNode.layer = maxL + 1;
  var edges = [];
  for (var i = 0; i < ctes.length; i++) {
    var c = ctes[i];
    for (var j = 0; j < (c.deps || []).length; j++) edges.push({ from: 'cte:' + c.deps[j], to: 'cte:' + c.name.toLowerCase() });
    for (var j = 0; j < (c.externalRefs || []).length; j++) edges.push({ from: 'ref:' + c.externalRefs[j], to: 'cte:' + c.name.toLowerCase() });
  }
  for (var j = 0; j < (finalDeps || []).length; j++) edges.push({ from: 'cte:' + finalDeps[j], to: 'final' });
  var layers = {};
  for (var i = 0; i < nodes.length; i++) { var ly = nodes[i].layer; if (!layers[ly]) layers[ly] = []; layers[ly].push(nodes[i]); }
  for (var ly in layers) layers[ly].forEach(function(n, idx) { n.col = idx; n.colCount = layers[ly].length; });
  return { nodes: nodes, edges: edges, layerCount: finalNode.layer + 1 };
}

function renderCTEGraph(parsed) {
  var layout = layoutCTEGraph(parsed);
  var nodes = layout.nodes, edges = layout.edges, layerCount = layout.layerCount;
  if (!nodes.length) return '<div style="padding:24px;color:var(--txm);text-align:center">No CTEs detected</div>';
  var NODE_W = 160, NODE_H = 40, LAYER_GAP = 80, COL_GAP = 40;
  var maxCols = 1;
  for (var i = 0; i < nodes.length; i++) { if (nodes[i].colCount > maxCols) maxCols = nodes[i].colCount; }
  var svgW = Math.max(600, maxCols * (NODE_W + COL_GAP) + COL_GAP);
  var svgH = layerCount * (NODE_H + LAYER_GAP) + LAYER_GAP;
  function getPos(n) {
    var lw = n.colCount * (NODE_W + COL_GAP) - COL_GAP;
    return { x: (svgW - lw) / 2 + n.col * (NODE_W + COL_GAP), y: LAYER_GAP / 2 + n.layer * (NODE_H + LAYER_GAP) };
  }
  var nc = {
    source: { fill: 'var(--blb)', stroke: 'var(--bl)', text: 'var(--bl)' },
    cte: { fill: 'var(--cyb)', stroke: 'var(--cy)', text: 'var(--cy)' },
    final: { fill: 'var(--acb)', stroke: 'var(--ac)', text: 'var(--ac)' }
  };
  var h = '<div style="display:flex;gap:16px;padding:12px 18px;flex-wrap:wrap;justify-content:center">';
  [['ref/source', 'var(--bl)'], ['CTE', 'var(--cy)'], ['Final SELECT', 'var(--ac)']].forEach(function(p) {
    h += '<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txd)">';
    h += '<div style="width:12px;height:12px;border-radius:3px;background:' + p[1] + '22;border:2px solid ' + p[1] + '"></div>' + p[0] + '</div>';
  });
  h += '</div>';
  h += '<div style="overflow-x:auto;border-radius:8px;border:1px solid var(--bd);background:var(--bg);margin:0 12px">';
  h += '<svg width="' + svgW + '" height="' + svgH + '" style="display:block">';
  h += '<defs><marker id="cte-arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 3.5L0 7z" fill="var(--txm)"/></marker></defs>';
  for (var ei = 0; ei < edges.length; ei++) {
    var e = edges[ei], f = null, t = null;
    for (var ni = 0; ni < nodes.length; ni++) { if (nodes[ni].id === e.from) f = nodes[ni]; if (nodes[ni].id === e.to) t = nodes[ni]; }
    if (!f || !t) continue;
    var fp = getPos(f), tp = getPos(t);
    var x1 = fp.x + NODE_W / 2, y1 = fp.y + NODE_H, x2 = tp.x + NODE_W / 2, y2 = tp.y;
    h += '<path d="M' + x1 + ',' + y1 + ' C' + x1 + ',' + (y1 + (y2-y1)*.4) + ' ' + x2 + ',' + (y2 - (y2-y1)*.4) + ' ' + x2 + ',' + y2 + '" fill="none" stroke="var(--txm)" stroke-opacity="0.35" stroke-width="1.2" marker-end="url(#cte-arr)"/>';
  }
  for (var ni = 0; ni < nodes.length; ni++) {
    var n = nodes[ni], p = getPos(n), c = nc[n.type];
    var label = n.label.length > 18 ? n.label.slice(0, 16) + '\u2026' : n.label;
    h += '<g style="cursor:pointer" onclick="selectCTENode(\'' + n.id.replace(/'/g, "\\'") + '\')">';
    h += '<rect x="' + p.x + '" y="' + p.y + '" width="' + NODE_W + '" height="' + NODE_H + '" rx="8" fill="' + c.fill + '" stroke="' + c.stroke + '" stroke-width="1.5"/>';
    h += '<text x="' + (p.x + NODE_W/2) + '" y="' + (p.y + NODE_H/2 + 1) + '" text-anchor="middle" dominant-baseline="central" fill="' + c.text + '" font-size="12" font-weight="600" font-family="var(--fn)">' + esc(label) + '</text>';
    h += '</g>';
  }
  h += '</svg></div>';
  h += '<div id="cte-detail"></div>';
  return h;
}

window.selectCTENode = function(nodeId) {
  var cteResults = DATA.cteResults || {};
  var panel = document.getElementById('right-panel');
  var detail = panel ? panel.querySelector('#cte-detail') : document.getElementById('cte-detail');
  if (!detail) return;
  for (var file in cteResults) {
    var parsed = cteResults[file];
    for (var i = 0; i < parsed.ctes.length; i++) {
      var c = parsed.ctes[i];
      if ('cte:' + c.name.toLowerCase() === nodeId) {
        detail.innerHTML = '<div style="margin:12px;background:var(--sf);border-radius:8px;border:1px solid var(--bd);overflow:hidden">' +
          '<div style="padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--sf2)">' +
          '<span class="badge" style="color:var(--cy);background:var(--cyb)">CTE</span>' +
          '<span style="font-family:var(--fn);font-size:14px;font-weight:700">' + esc(c.name) + '</span>' +
          (c.deps && c.deps.length ? '<span style="font-size:11px;color:var(--txm)">\u2190 ' + c.deps.join(', ') + '</span>' : '') +
          '</div><pre class="sql-pre">' + highlightSQL(c.body) + '</pre></div>';
        return;
      }
    }
    if (nodeId === 'final') {
      detail.innerHTML = '<div style="margin:12px;background:var(--sf);border-radius:8px;border:1px solid var(--bd);overflow:hidden">' +
        '<div style="padding:10px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;background:var(--sf2)">' +
        '<span class="badge" style="color:var(--ac);background:var(--acb)">SELECT</span>' +
        '<span style="font-family:var(--fn);font-size:14px;font-weight:700">Final SELECT</span>' +
        (parsed.finalDeps && parsed.finalDeps.length ? '<span style="font-size:11px;color:var(--txm)">\u2190 ' + parsed.finalDeps.join(', ') + '</span>' : '') +
        '</div><pre class="sql-pre">' + highlightSQL(parsed.finalSelect) + '</pre></div>';
      return;
    }
    if (nodeId.startsWith('ref:')) {
      var refName = nodeId.slice(4);
      detail.innerHTML = '<div style="margin:12px;padding:12px 16px;background:var(--sf);border-radius:8px;border:1px solid var(--bd);font-family:var(--fn);font-size:12px;color:var(--bl)">' +
        '<span class="badge" style="color:var(--bl);background:var(--blb);margin-right:8px">ref</span>' + esc(refName) + '</div>';
      return;
    }
  }
  detail.innerHTML = '';
};

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function highlightSQL(s) {
  const e = String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // BigQuery SQL keywords
  const keywords = 'SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|FULL|CROSS|ON|AND|OR|NOT|IN|IS|NULL|AS|WITH|CASE|WHEN|THEN|ELSE|END|GROUP|BY|ORDER|HAVING|LIMIT|OFFSET|UNION|ALL|DISTINCT|INSERT|UPDATE|DELETE|INTO|VALUES|SET|CREATE|DROP|ALTER|TABLE|INDEX|EXISTS|BETWEEN|LIKE|CAST|OVER|PARTITION|TRUE|FALSE|ASC|DESC|NULLS|FIRST|LAST|RECURSIVE|EXCEPT|INTERSECT|LATERAL|UNNEST|WINDOW|ROWS|RANGE|UNBOUNDED|PRECEDING|FOLLOWING|CURRENT|ROW|QUALIFY|PIVOT|UNPIVOT|TABLESAMPLE|FOR|SYSTEM_TIME|STRUCT|ARRAY|MERGE|USING|MATCHED|DECLARE|BEGIN|LOOP|WHILE|BREAK|CONTINUE|RETURN|RAISE|ASSERT|TEMP|TEMPORARY|REPLACE|VIEW|FUNCTION|PROCEDURE|RETURNS|LANGUAGE|OPTIONS|EXPORT|DATA|INTERVAL|AT|TIME|ZONE|RESPECT|IGNORE|ANY_VALUE|IF|IIF|IFNULL|NULLIF|SAFE_CAST';
  // BigQuery functions
  const functions = [
    // Aggregate
    'COUNT|SUM|AVG|MIN|MAX|ARRAY_AGG|STRING_AGG|COUNTIF|LOGICAL_AND|LOGICAL_OR|BIT_AND|BIT_OR|BIT_XOR|APPROX_COUNT_DISTINCT|APPROX_QUANTILES|APPROX_TOP_COUNT|APPROX_TOP_SUM|ANY_VALUE|CORR|COVAR_POP|COVAR_SAMP|STDDEV|STDDEV_POP|STDDEV_SAMP|VARIANCE|VAR_POP|VAR_SAMP',
    // Analytic / Window
    'ROW_NUMBER|RANK|DENSE_RANK|PERCENT_RANK|CUME_DIST|NTILE|LAG|LEAD|FIRST_VALUE|LAST_VALUE|NTH_VALUE|PERCENTILE_CONT|PERCENTILE_DISC',
    // String
    'CONCAT|LENGTH|LOWER|UPPER|TRIM|LTRIM|RTRIM|LPAD|RPAD|SUBSTR|SUBSTRING|REPLACE|REVERSE|REPEAT|FORMAT|STARTS_WITH|ENDS_WITH|CONTAINS_SUBSTR|REGEXP_CONTAINS|REGEXP_EXTRACT|REGEXP_EXTRACT_ALL|REGEXP_REPLACE|SPLIT|BYTE_LENGTH|CHAR_LENGTH|CHARACTER_LENGTH|LEFT|RIGHT|STRPOS|SAFE_CONVERT_BYTES_TO_STRING|TO_BASE64|FROM_BASE64|TO_HEX|FROM_HEX|INITCAP|NORMALIZE|NORMALIZE_AND_CASEFOLD|TRANSLATE|UNICODE|CHR|ASCII|SOUNDEX|COLLATE',
    // Date / Time / Timestamp
    'DATE|DATETIME|TIME|TIMESTAMP|CURRENT_DATE|CURRENT_DATETIME|CURRENT_TIME|CURRENT_TIMESTAMP|DATE_ADD|DATE_SUB|DATE_DIFF|DATE_TRUNC|DATE_FROM_UNIX_DATE|UNIX_DATE|DATETIME_ADD|DATETIME_SUB|DATETIME_DIFF|DATETIME_TRUNC|TIME_ADD|TIME_SUB|TIME_DIFF|TIME_TRUNC|TIMESTAMP_ADD|TIMESTAMP_SUB|TIMESTAMP_DIFF|TIMESTAMP_TRUNC|TIMESTAMP_SECONDS|TIMESTAMP_MILLIS|TIMESTAMP_MICROS|UNIX_SECONDS|UNIX_MILLIS|UNIX_MICROS|EXTRACT|FORMAT_DATE|FORMAT_DATETIME|FORMAT_TIME|FORMAT_TIMESTAMP|PARSE_DATE|PARSE_DATETIME|PARSE_TIME|PARSE_TIMESTAMP|LAST_DAY',
    // Math
    'ABS|SIGN|ROUND|TRUNC|CEIL|CEILING|FLOOR|MOD|DIV|POW|POWER|SQRT|LOG|LOG10|LN|EXP|GREATEST|LEAST|SAFE_DIVIDE|SAFE_MULTIPLY|SAFE_NEGATE|SAFE_ADD|SAFE_SUBTRACT|IEEE_DIVIDE|RAND|RANGE_BUCKET',
    // Conversion
    'CAST|SAFE_CAST|PARSE_JSON|TO_JSON|TO_JSON_STRING|INT64|FLOAT64|NUMERIC|BIGNUMERIC|STRING|BYTES|BOOL',
    // Array / Struct
    'ARRAY_LENGTH|ARRAY_TO_STRING|ARRAY_REVERSE|ARRAY_CONCAT|GENERATE_ARRAY|GENERATE_DATE_ARRAY|GENERATE_TIMESTAMP_ARRAY|OFFSET|ORDINAL|SAFE_OFFSET|SAFE_ORDINAL|FLATTEN',
    // Conditional
    'COALESCE|IFNULL|NULLIF|IF|IIF',
    // JSON
    'JSON_EXTRACT|JSON_EXTRACT_SCALAR|JSON_EXTRACT_ARRAY|JSON_EXTRACT_STRING_ARRAY|JSON_QUERY|JSON_VALUE|JSON_QUERY_ARRAY|JSON_VALUE_ARRAY|JSON_TYPE|LAX_BOOL|LAX_FLOAT64|LAX_INT64|LAX_STRING',
    // Hash / Geography / Other
    'MD5|SHA1|SHA256|SHA512|FARM_FINGERPRINT|ST_GEOGPOINT|ST_DISTANCE|ST_WITHIN|ST_AREA|ST_ASTEXT|ST_GEOGFROMTEXT|ERROR|GENERATE_UUID',
    // dbt Jinja
    'ref|source|config|var'
  ].join('|');
  return e
    .replace(/--.*$/gm, '<span class="sql-comment">$&</span>')
    .replace(/('(?:[^'\\]|\\.)*')/g, '<span class="sql-string">$1</span>')
    .replace(/\{\{[^}]*\}\}/g, '<span class="sql-jinja">$&</span>')
    .replace(new RegExp('\\b(' + functions + ')\\s*\\(', 'gi'), (m, fn) => '<span class="sql-func">' + fn + '</span>(')
    .replace(new RegExp('\\b(' + keywords + ')\\b', 'gi'), (m) => {
      if (m.match(/^<span/)) return m; // skip already highlighted
      return '<span class="sql-keyword">' + m.toUpperCase() + '</span>';
    })
    .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="sql-number">$1</span>');
}
function highlightYAML(s) {
  const e = String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return e
    .replace(/#.*$/gm, '<span class="yaml-comment">$&</span>')
    .replace(/^(\s*-?\s*)([a-zA-Z_][\w.]*)(\s*:)/gm, '$1<span class="yaml-key">$2</span>$3')
    .replace(/:\s+('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*")\s*$/gm, (m, str) => m.replace(str, '<span class="yaml-str">' + str + '</span>'))
    .replace(/\b(true|false|yes|no)\b/gi, '<span class="yaml-bool">$&</span>')
    .replace(/\bnull\b/gi, '<span class="yaml-null">$&</span>')
    .replace(/:\s+(\d+(?:\.\d+)?)\s*$/gm, (m, n) => m.replace(n, '<span class="yaml-num">' + n + '</span>'));
}
function jsStr(s) { return JSON.stringify(String(s)).replace(/"/g, '&quot;'); }

function cardBorderStyle(key) {
  const s = reviews[key];
  if (s === 'approved') return 'border-left:3px solid var(--ac);';
  if (s === 'needs_change') return 'border-left:3px solid var(--rd);';
  return '';
}

function renderValue(v) {
  if (v === null || v === undefined) return '<span class="v-null">null</span>';
  if (v === true) return '<span class="v-true">true</span>';
  if (v === false) return '<span class="v-false">false</span>';
  if (typeof v === 'number') return '<span class="v-num">' + v + '</span>';
  return '<span class="v-str">' + esc(v) + '</span>';
}

function renderTable(rows, accent, label) {
  if (!rows?.length) return '<div style="padding:12px;color:var(--txm);font-style:italic">No data</div>';
  const cols = [...new Set(rows.flatMap(r => r && typeof r === 'object' ? Object.keys(r) : []))];
  if (!cols.length) return '';
  let h = '';
  if (label) h += '<div class="tbl-label" style="color:' + accent + '">' + esc(label) + '</div>';
  h += '<table><thead><tr><th style="text-align:center;width:36px">#</th>';
  cols.forEach(c => h += '<th>' + esc(c) + '</th>');
  h += '</tr></thead><tbody>';
  rows.forEach((r, i) => {
    h += '<tr>';
    h += '<td style="text-align:center;color:var(--txm);font-size:11px">' + (i + 1) + '</td>';
    cols.forEach(c => h += '<td>' + renderValue(r?.[c]) + '</td>');
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

function renderReviewBtns(key) {
  const btns = [
    ['approved', '\u2713 OK', '--ac', '--acb'],
    ['needs_change', '\u2717 Needs Change', '--rd', '--rdb'],
    ['pending', '\u2014 Pending', '--or', '--orb'],
  ];
  const jKey = jsStr(key);
  return '<div class="review-btns" onclick="event.stopPropagation()">' + btns.map(([s, label, c, bg]) => {
    const active = reviews[key] === s;
    const style = active
      ? 'color:var(' + c + ');background:var(' + bg + ');border-color:var(' + c + ');font-weight:700'
      : '';
    return '<button style="' + style + '" onclick="setReview(' + jKey + ',\'' + s + '\')">' + label + '</button>';
  }).join('') + '</div>';
}

function renderComment(key) {
  const jKey = jsStr(key);
  return '<div style="padding:0 18px 12px"><textarea class="comment-box" placeholder="Review comment..." onclick="event.stopPropagation()" onkeydown="if(event.key===\'Escape\'){this.blur();event.stopPropagation()}" oninput="setComment(' + jKey + ',this.value)">' + esc(comments[key] || '') + '</textarea></div>';
}

function renderConfig(config) {
  if (!config || typeof config !== 'object' || !Object.keys(config).length) return '';
  let h = '<div style="padding:10px 18px;border-top:1px solid var(--bd);display:flex;flex-direction:column;gap:6px">';
  for (const [k, v] of Object.entries(config)) {
    if (Array.isArray(v)) {
      h += '<div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center">';
      h += '<span class="config-key">' + esc(k) + ':</span>';
      v.forEach(item => h += '<span class="config-chip">' + esc(item) + '</span>');
      h += '</div>';
    } else {
      const isExpr = /expression|condition|where/i.test(k);
      h += '<div class="config-row"><span class="config-key">' + esc(k) + ':</span>';
      if (isExpr) h += '<code class="config-expr">' + esc(v) + '</code>';
      else if (typeof v === 'number') h += '<span style="font-size:12px;font-family:var(--fn);color:var(--or)">' + v + '</span>';
      else if (typeof v === 'boolean') h += '<span style="font-size:12px;font-family:var(--fn);color:var(' + (v ? '--ac' : '--rd') + ')">' + v + '</span>';
      else h += '<span class="config-val">' + esc(typeof v === 'object' ? JSON.stringify(v) : v) + '</span>';
      h += '</div>';
    }
  }
  h += '</div>';
  return h;
}

function groupByModel(tests) {
  const models = {};
  for (const t of tests) {
    const m = t.model || '(other)';
    if (!models[m]) models[m] = { unit: [], schema: [], data: [], modelLevel: [] };
    if (t.type === 'schema' && t.column === '(model-level)') models[m].modelLevel.push(t);
    else if (t.type === 'schema') models[m].schema.push(t);
    else models[m][t.type].push(t);
  }
  return models;
}

function groupSchemaByColumn(schemaTests) {
  const cols = {};
  for (const t of schemaTests) {
    const c = t.column || '?';
    if (!cols[c]) cols[c] = { tests: [], description: t.description || '', data_type: t.data_type || null };
    cols[c].tests.push(t);
    if (t.description && !cols[c].description) cols[c].description = t.description;
    if (t.data_type && !cols[c].data_type) cols[c].data_type = t.data_type;
  }
  return cols;
}

function matchFilter(key, type) {
  if (filter === 'all') return true;
  if (['unit', 'data', 'semantic'].includes(filter)) return type === filter;
  if (filter === 'schema') return type === 'schema';
  return reviews[key] === filter;
}

function render() {
  const tests = selectedFile ? DATA.allTests.filter(t => t.sourceFile === selectedFile) : DATA.allTests;
  const coverage = selectedFile ? (DATA.coverageData || []).filter(c => c.sourceFile === selectedFile) : (DATA.coverageData || []);
  const fileSM = selectedFile ? (DATA.semanticModels || []).filter(sm => sm.sourceFile === selectedFile) : (DATA.semanticModels || []);
  const fileMetrics = selectedFile ? (DATA.metrics || []).filter(mt => mt.sourceFile === selectedFile) : (DATA.metrics || []);
  // Stats always computed from ALL tests (for global filter buttons)
  const globalKeys = [...new Set(DATA.allTests.map(reviewKey))];
  const semanticKeys = (DATA.semanticModels || []).map(sm => 'semantic:' + sm.name + ':' + sm.modelRef);
  // Collect excluded/untested column keys for stats
  const colKeys = [];
  (DATA.coverageData || []).forEach(cov => {
    cov.columns.filter(c => c.status === 'untested' || c.status === 'excluded').forEach(c => {
      colKeys.push('col:' + cov.model + ':' + c.name);
    });
  });
  const stats = { total: globalKeys.length + semanticKeys.length + colKeys.length, unit: 0, schema: 0, data: 0, semantic: semanticKeys.length, approved: 0, needs_change: 0, pending: 0 };
  const seen = new Set();
  DATA.allTests.forEach(t => {
    const k = reviewKey(t);
    if (!seen.has(k)) {
      seen.add(k);
      if (t.type === 'schema' && t.column !== '(model-level)') stats.schema++;
      else stats[t.type]++;
      stats[reviews[k] || 'pending']++;
    }
  });
  colKeys.forEach(k => { if (!seen.has(k)) { seen.add(k); stats.schema++; stats[reviews[k] || 'pending']++; } });
  semanticKeys.forEach(k => { stats[reviews[k] || 'pending']++; });

  let h = '';
  h += '<div style="position:sticky;top:0;z-index:10;background:var(--bg);padding:16px 16px 0;border-bottom:1px solid var(--bd);box-shadow:0 -20px 0 20px var(--bg)">';
  h += '<div style="margin-bottom:10px;font-size:12px;color:var(--txd)">';
  if (selectedFile) {
    h += '<span style="color:var(--bl);cursor:pointer" onclick="selectFile(null)">\u2190 All Files</span> / ';
    h += '<span style="color:var(--tx)">' + esc(selectedFile) + '</span>';
    const parts = [];
    if (tests.length) parts.push(tests.length + ' tests');
    if (fileSM.length) parts.push(fileSM.length + ' semantic models');
    if (fileMetrics.length) parts.push(fileMetrics.length + ' metrics');
    if (parts.length) h += ' \u2014 ' + parts.join(', ');
  } else {
    h += DATA.fileCount + ' files / ' + tests.length + ' tests / ' + stats.total + ' review items (Unit: ' + stats.unit + ', Column: ' + stats.schema + ', Data: ' + stats.data + (stats.semantic ? ', Semantic: ' + stats.semantic : '') + ')';
  }
  h += '</div>';

  // Type filters
  h += '<div class="filters" style="margin-bottom:6px">';
  const typeDefs = [
    ['all', 'All (' + stats.total + ')', '--tx'],
    stats.unit > 0 && ['unit', 'Unit (' + stats.unit + ')', '--bl'],
    stats.schema > 0 && ['schema', 'Column (' + stats.schema + ')', '--pu'],
    stats.data > 0 && ['data', 'Data (' + stats.data + ')', '--or'],
    stats.semantic > 0 && ['semantic', 'Semantic (' + stats.semantic + ')', '--cy'],
  ].filter(Boolean);
  typeDefs.forEach(([k, label, c]) => {
    const active = filter === k;
    const style = active ? 'color:var(--bg);background:var(' + c + ');border-color:var(' + c + ')' : '';
    h += '<button class="' + (active ? 'active' : '') + '" style="' + style + '" onclick="setFilter(\'' + k + '\')">' + label + '</button>';
  });
  h += '</div>';
  // Status filters
  h += '<div class="filters" style="margin-bottom:10px">';
  const statusDefs = [
    ['pending', 'Pending (' + stats.pending + ')', '--or'],
    ['approved', 'OK (' + stats.approved + ')', '--ac'],
    stats.needs_change > 0 && ['needs_change', 'Needs Change (' + stats.needs_change + ')', '--rd'],
  ].filter(Boolean);
  statusDefs.forEach(([k, label, c]) => {
    const active = filter === k;
    const style = active ? 'color:var(--bg);background:var(' + c + ');border-color:var(' + c + ')' : '';
    h += '<button class="' + (active ? 'active' : '') + '" style="' + style + '" onclick="setFilter(\'' + k + '\')">' + label + '</button>';
  });
  h += '</div>';

  h += '<div class="progress" style="margin-bottom:0">';
  if (stats.total) {
    h += '<div style="width:' + (stats.approved / stats.total * 100) + '%;background:var(--ac);transition:width .3s"></div>';
    h += '<div style="width:' + (stats.needs_change / stats.total * 100) + '%;background:var(--rd);transition:width .3s"></div>';
  }
  h += '</div>';
  const reviewed = stats.approved + stats.needs_change;
  const pct = stats.total ? Math.round(reviewed / stats.total * 100) : 0;
  h += '<div class="progress-text">' + reviewed + '/' + stats.total + ' reviewed (' + pct + '%)</div>';
  h += '</div>';
  h += '<div style="padding:16px">';

  const models = groupByModel(tests);

  // Add model groups for semantic models and coverage in this file
  fileSM.forEach(sm => {
    const ref = sm.modelRef || sm.name;
    if (!models[ref]) models[ref] = { unit: [], schema: [], data: [], modelLevel: [] };
  });
  coverage.forEach(cov => {
    if (!models[cov.model]) models[cov.model] = { unit: [], schema: [], data: [], modelLevel: [] };
  });

  for (const [modelName, group] of Object.entries(models)) {
    const modelId = 'model_' + modelName.replace(/[^a-zA-Z0-9]/g, '_');
    const cov = coverage.find(c => c.model === modelName);
    const testCount = group.unit.length + group.schema.length + group.data.length + group.modelLevel.length;

    // Skip entire model group if no cards match current filter
    if (filter !== 'all') {
      const hasUnit = filter === 'unit' && group.unit.length > 0;
      const hasSchema = filter === 'schema' && (group.schema.length > 0 || group.modelLevel.length > 0);
      const hasData = filter === 'data' && group.data.length > 0;
      const hasSemantic = filter === 'semantic' && fileSM.some(sm => sm.modelRef === modelName);
      const hasStatus = ['approved', 'needs_change', 'pending'].includes(filter) && (
        [...group.unit, ...group.schema, ...group.data, ...group.modelLevel].some(t => reviews[reviewKey(t)] === filter) ||
        fileSM.filter(sm => sm.modelRef === modelName).some(sm => reviews['semantic:' + sm.name + ':' + modelName] === filter) ||
        (cov ? cov.columns.filter(c => c.status === 'untested' || c.status === 'excluded').some(c => reviews['col:' + modelName + ':' + c.name] === filter) : false)
      );
      if (!hasUnit && !hasSchema && !hasData && !hasSemantic && !hasStatus) continue;
    }

    const isOpen = openSections[modelId] !== false;

    // Check for CTE data for this model
    const cteResults = DATA.cteResults || {};
    const modelCTEFile = Object.keys(cteResults).find(f => f.split('/').pop().replace(/\.sql$/i, '') === modelName);

    h += '<div class="model-group">';
    h += '<div class="model-head" onclick="toggleSection(\'' + modelId + '\')">';
    h += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
    h += '<span class="arrow ' + (isOpen ? 'open' : '') + '">\u25B6</span>';
    h += '<span style="font-size:14px;font-weight:700;font-family:var(--fn)">' + esc(modelName) + '</span>';
    const smCountForHeader = fileSM.filter(sm => sm.modelRef === modelName).length;
    if (testCount > 0) h += '<span style="font-size:12px;color:var(--txd)">' + testCount + ' tests</span>';
    if (smCountForHeader > 0) h += '<span style="font-size:12px;color:var(--cy)">' + smCountForHeader + ' semantic</span>';
    if (modelCTEFile) {
      h += '<button class="cte-open-btn" onclick="event.stopPropagation();openCTEPanel(' + jsStr(modelCTEFile) + ')" title="Show CTE dependency graph">';
      h += '\u29BF CTE ' + cteResults[modelCTEFile].ctes.length;
      h += '</button>';
    }
    const modelDesc = (DATA.modelDescriptions || {})[modelName];
    if (modelDesc) h += '<span style="font-size:12px;color:var(--txm);font-weight:400">' + esc(modelDesc) + '</span>';
    if (cov) {
      h += '<div style="display:flex;align-items:center;gap:6px">';
      h += '<div class="cov-bar"><div style="width:' + (cov.total ? cov.tested / cov.total * 100 : 0) + '%;background:var(--ac)"></div>';
      h += '<div style="width:' + (cov.total ? cov.excluded / cov.total * 100 : 0) + '%;background:var(--txm)"></div></div>';
      const covColor = cov.coveragePercent === 100 ? 'var(--ac)' : cov.untested > 0 ? 'var(--or)' : 'var(--txd)';
      h += '<span style="font-size:11px;font-family:var(--fn);color:' + covColor + '">' + cov.coveragePercent + '%</span>';
      h += '</div>';
    }
    h += '</div></div>';

    h += '<div class="model-body ' + (isOpen ? 'open' : '') + '" id="' + modelId + '">';

    // Source file buttons (open in right panel)
    const sourceFiles = [...new Set([...group.unit, ...group.schema, ...group.data, ...group.modelLevel].map(t => t.sourceFile).filter(Boolean))];
    if (sourceFiles.length && (DATA.fileContents || {})[sourceFiles[0]]) {
      h += '<div style="padding:8px 18px;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">';
      sourceFiles.forEach(sf => {
        h += '<button class="raw-btn" onclick="event.stopPropagation();openSourcePanel(' + jsStr(sf) + ')">' + esc(sf.split('/').pop()) + '</button>';
      });
      h += '</div>';
    }

    // Unit tests
    for (const test of group.unit) {
      const key = reviewKey(test);
      if (!matchFilter(key, 'unit')) continue;
      const cardId = 'card_' + key.replace(/[^a-zA-Z0-9]/g, '_');
      const cardOpen = openSections[cardId] !== false;
      h += '<div class="card" data-review-key="' + esc(key) + '" onclick="focusCard(this)" style="' + cardBorderStyle(key) + '">';
      h += '<div class="card-head clickable with-border" onclick="toggleSection(\'' + cardId + '\')">';
      h += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
      h += '<span class="arrow ' + (cardOpen ? 'open' : '') + '">\u25B6</span>';
      h += '<span class="badge" style="color:var(--bl);background:var(--blb)">Unit</span>';
      h += '<span class="card-name">' + esc(test.name) + '</span>';
      if (test.sourceFile) h += '<span class="card-dim" style="font-family:var(--fn);font-size:10px;background:var(--sf2);padding:1px 6px;border-radius:3px;border:1px solid var(--bd)">' + esc(test.sourceFile) + '</span>';
      h += '</div>' + renderReviewBtns(key) + '</div>';
      h += '<div class="card-body ' + (cardOpen ? 'open' : '') + '" id="' + cardId + '">';
      if (test.description) h += '<div style="padding:8px 18px;font-size:13px;color:var(--txd);border-bottom:1px solid var(--bd)">' + esc(test.description) + '</div>';
      h += '<div class="section-label" style="color:var(--bl)">\u2193 INPUT (given)</div>';
      test.given.forEach(g => {
        if (!g.rows || !g.rows.length) return;
        h += '<div class="tbl-wrap">' + renderTable(g.rows, 'var(--bl)', g.input + ' \u2014 ' + g.rows.length + ' rows') + '</div>';
      });
      h += '<div class="separator"></div>';
      h += '<div class="section-label" style="color:var(--ac)">\u2191 EXPECTED OUTPUT</div>';
      h += '<div class="tbl-wrap">' + renderTable(test.expect, 'var(--ac)', 'expect \u2014 ' + test.expect.length + ' rows') + '</div>';

      // Branch coverage analysis
      if (test.branchAnalysis?.length) {
        const uncovered = test.branchAnalysis.filter(b => !b.covered);
        const total = test.branchAnalysis.length;
        const covered = total - uncovered.length;
        h += '<div class="separator"></div>';
        h += '<div class="section-label" style="color:' + (uncovered.length ? 'var(--or)' : 'var(--ac)') + '">';
        h += '\u2194 BRANCH COVERAGE (' + covered + '/' + total + ')</div>';
        h += '<div style="padding:4px 18px 10px;display:flex;flex-direction:column;gap:4px">';
        test.branchAnalysis.forEach(b => {
          const color = b.covered ? 'var(--ac)' : 'var(--or)';
          const icon = b.covered ? '\u2713' : '\u2717';
          const clickable = b.line && test.branchSourceFile;
          const onclick = clickable ? ' onclick="openSourcePanel(' + jsStr(test.branchSourceFile) + ',' + b.line + ')" style="cursor:pointer;font-size:12px;font-family:var(--fn);display:flex;gap:8px;align-items:baseline;padding:2px 0;border-radius:3px;transition:background .1s" onmouseover="this.style.background=\'var(--sf2)\'" onmouseout="this.style.background=\'transparent\'"' : ' style="font-size:12px;font-family:var(--fn);display:flex;gap:8px;align-items:baseline;padding:2px 0"';
          h += '<div' + onclick + '>';
          h += '<span style="color:' + color + '">' + icon + '</span>';
          h += '<span class="badge" style="color:var(--txm);background:var(--sf2);font-size:10px">' + esc(b.type) + '</span>';
          h += '<code style="color:var(--bl);font-size:12px">' + esc(b.condition) + '</code>';
          if (b.line) { const bsf = test.branchSourceFile ? esc(test.branchSourceFile.split('/').pop()) + ':' : ''; h += '<span style="color:var(--txm);font-size:10px;font-family:var(--fn)">' + bsf + b.line + '</span>'; }
          if (!b.covered) h += '<span style="color:var(--txm);font-size:11px;font-style:italic">' + esc(b.coverageNote) + '</span>';
          h += '</div>';
        });
        h += '</div>';
      }

      h += renderComment(key);
      h += '</div></div>';
    }

    // Data tests
    for (const test of group.data) {
      const key = reviewKey(test);
      if (!matchFilter(key, 'data')) continue;
      const cardId = 'card_' + key.replace(/[^a-zA-Z0-9]/g, '_');
      const cardOpen = openSections[cardId] !== false;
      h += '<div class="card" data-review-key="' + esc(key) + '" onclick="focusCard(this)" style="' + cardBorderStyle(key) + '">';
      h += '<div class="card-head clickable with-border" onclick="toggleSection(\'' + cardId + '\')">';
      h += '<div style="display:flex;align-items:center;gap:10px">';
      h += '<span class="arrow ' + (cardOpen ? 'open' : '') + '">\u25B6</span>';
      h += '<span class="badge" style="color:var(--or);background:var(--orb)">Data Test</span>';
      h += '<span class="card-name" style="font-size:14px">' + esc(test.name) + '</span>';
      h += '</div>' + renderReviewBtns(key) + '</div>';
      h += '<div class="card-body ' + (cardOpen ? 'open' : '') + '" id="' + cardId + '">';
      if (test.inputs?.length) {
        h += '<div style="padding:10px 18px;border-bottom:1px solid var(--bd)">';
        h += '<span style="font-size:11px;font-weight:600;font-family:var(--fn);color:var(--bl);margin-right:8px">REFS:</span>';
        test.inputs.forEach(r => h += '<span class="config-chip">' + esc(r) + '</span>');
        h += '</div>';
      }
      h += '<pre class="sql-pre">' + highlightSQL(test.sql) + '</pre>';
      h += renderComment(key);
      h += '</div></div>';
    }

    // Model-level tests
    for (const test of group.modelLevel) {
      const key = reviewKey(test);
      if (!matchFilter(key, 'schema')) continue;
      const isUtils = test.name.startsWith('dbt_utils.');
      const displayName = isUtils ? test.name.replace('dbt_utils.', '') : test.name;
      h += '<div class="card" data-review-key="' + esc(key) + '" onclick="focusCard(this)" style="' + cardBorderStyle(key) + '"><div class="card-head"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      h += '<span class="badge" style="color:var(--cy);background:var(--cyb)">model-level</span>';
      if (isUtils) h += '<span class="badge" style="color:var(--or);background:var(--orb)">dbt_utils</span>';
      h += '<span class="card-name">' + esc(displayName) + '</span>';
      h += '</div>' + renderReviewBtns(key) + '</div>';
      h += renderConfig(test.config);
      h += renderComment(key);
      h += '</div>';
    }

    // Schema tests grouped by column
    const colGroups = groupSchemaByColumn(group.schema);
    for (const [colName, colGroup] of Object.entries(colGroups)) {
      const key = 'col:' + modelName + ':' + colName;
      if (!matchFilter(key, 'schema')) continue;

      h += '<div class="card" data-review-key="' + esc(key) + '" onclick="focusCard(this)" style="' + cardBorderStyle(key) + '">';
      h += '<div class="card-head"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
      h += '<span class="badge" style="color:var(--pu);background:var(--pub)">Column</span>';
      h += '<span class="card-name">' + esc(colName) + '</span>';
      if (colGroup.data_type) h += '<span class="dtype-chip">' + esc(colGroup.data_type) + '</span>';
      h += '<span style="font-size:11px;color:var(--txd)">' + colGroup.tests.length + ' tests</span>';
      h += '</div>' + renderReviewBtns(key) + '</div>';
      if (colGroup.description) {
        h += '<div style="padding:4px 18px 8px;font-size:12px;color:var(--txd)">' + esc(colGroup.description) + '</div>';
      }
      h += '<div style="padding:6px 18px 10px;display:flex;flex-wrap:wrap;gap:6px">';
      for (const st of colGroup.tests) {
        const isUtils = st.name.startsWith('dbt_utils.');
        const dn = isUtils ? st.name.replace('dbt_utils.', '') : st.name;
        const color = isUtils ? 'var(--or)' : 'var(--pu)';
        const bg = isUtils ? 'var(--orb)' : 'var(--pub)';
        let badgeExtra = '';
        if (st.config && Array.isArray(st.config.values)) badgeExtra = ' (' + st.config.values.length + ')';
        h += '<span class="badge" style="color:' + color + ';background:' + bg + '">' + esc(dn) + badgeExtra + '</span>';
      }
      h += '</div>';
      for (const st of colGroup.tests) {
        if (st.config && Object.keys(st.config).length) {
          h += '<div style="padding:2px 18px 4px;font-size:11px;color:var(--txm);font-family:var(--fn)">' + esc(st.name) + ':</div>';
          h += renderConfig(st.config);
        }
      }
      h += renderComment(key);
      h += '</div>';
    }

    // Untested columns
    if (cov) {
      const untestedCols = cov.columns.filter(c => c.status === 'untested');
      for (const col of untestedCols) {
        if (colGroups[col.name]) continue;
        const key = 'col:' + modelName + ':' + col.name;
        if (!matchFilter(key, 'schema')) continue;
        h += '<div class="card untested" data-review-key="' + esc(key) + '" onclick="focusCard(this)" style="' + cardBorderStyle(key) + '">';
        h += '<div class="card-head"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
        h += '<span class="badge" style="color:var(--or);background:var(--orb)">Untested</span>';
        h += '<span class="card-name">' + esc(col.name) + '</span>';
        if (col.data_type) h += '<span class="dtype-chip">' + esc(col.data_type) + '</span>';
        h += '</div>' + renderReviewBtns(key) + '</div>';
        if (col.description) {
          h += '<div style="padding:4px 18px 8px;font-size:12px;color:var(--txd)">' + esc(col.description) + '</div>';
        }
        h += '<div class="no-test-guide">No tests defined. Add a test or explicitly exclude with <code style="font-family:var(--fn);font-size:11px">meta: { no_test: true, reason: "..." }</code> .</div>';
        h += renderComment(key);
        h += '</div>';
      }
    }

    // Excluded columns (no_test: true)
    if (cov) {
      const excludedCols = cov.columns.filter(c => c.status === 'excluded');
      for (const col of excludedCols) {
        if (colGroups[col.name]) continue;
        const key = 'col:' + modelName + ':' + col.name;
        if (!matchFilter(key, 'schema')) continue;
        h += '<div class="card" data-review-key="' + esc(key) + '" onclick="focusCard(this)" style="border-color:var(--txm);' + cardBorderStyle(key) + '">';
        h += '<div class="card-head"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
        h += '<span class="badge" style="color:var(--txm);background:var(--sf2)">Excluded</span>';
        h += '<span class="card-name">' + esc(col.name) + '</span>';
        if (col.data_type) h += '<span class="dtype-chip">' + esc(col.data_type) + '</span>';
        h += '</div>' + renderReviewBtns(key) + '</div>';
        if (col.description) {
          h += '<div style="padding:4px 18px 8px;font-size:12px;color:var(--txd)">' + esc(col.description) + '</div>';
        }
        if (col.excludeReason) {
          h += '<div style="padding:2px 18px 8px;font-size:12px;color:var(--txm);font-style:italic">' + esc(col.excludeReason) + '</div>';
        }
        h += renderComment(key);
        h += '</div>';
      }
    }

    // Coverage summary
    if (cov) {
      const covId = 'cov_' + modelName.replace(/[^a-zA-Z0-9]/g, '_');
      const covOpen = openSections[covId] === true;
      h += '<div class="cov-summary">';
      h += '<div class="cov-head" onclick="toggleSection(\'' + covId + '\')">';
      h += '<div style="display:flex;align-items:center;gap:8px">';
      h += '<span class="arrow ' + (covOpen ? 'open' : '') + '">\u25B6</span>';
      h += '<span style="font-size:12px;font-weight:700;font-family:var(--fn)">Coverage</span>';
      h += '<span style="font-size:12px;color:var(--txd)">' + cov.tested + ' tested, ' + cov.excluded + ' excluded, ' + cov.untested + ' untested / ' + cov.total + ' columns</span>';
      h += '</div>';
      h += '<span style="font-size:13px;font-weight:700;font-family:var(--fn);color:' + (cov.coveragePercent === 100 ? 'var(--ac)' : 'var(--or)') + '">' + cov.coveragePercent + '%</span>';
      h += '</div>';
      h += '<div class="cov-body ' + (covOpen ? 'open' : '') + '" id="' + covId + '">';
      if (cov.untested) {
        h += '<div style="margin-bottom:8px;font-size:11px;font-weight:700;color:var(--or)">Untested</div>';
        cov.columns.filter(c => c.status === 'untested').forEach(c => {
          h += '<div class="cov-item"><span style="color:var(--or)">\u25CF</span> ' + esc(c.name);
          if (c.data_type) h += ' <span class="dtype-chip">' + esc(c.data_type) + '</span>';
          h += '</div>';
        });
      }
      if (cov.excluded) {
        h += '<div style="margin:8px 0 4px;font-size:11px;font-weight:700;color:var(--txm)">Excluded</div>';
        cov.columns.filter(c => c.status === 'excluded').forEach(c => {
          h += '<div class="cov-item"><span style="color:var(--txm)">\u25CF</span> ' + esc(c.name) + ' <span style="color:var(--txm);font-style:italic">' + esc(c.excludeReason || '') + '</span></div>';
        });
      }
      h += '<div style="margin:8px 0 4px;font-size:11px;font-weight:700;color:var(--ac)">Tested</div>';
      cov.columns.filter(c => c.status === 'tested').forEach(c => {
        h += '<div class="cov-item"><span style="color:var(--ac)">\u25CF</span> ' + esc(c.name) + ' <span style="color:var(--txd)">(' + c.testCount + ')</span></div>';
      });
      h += '</div></div>';
    }

    // Semantic Layer cards for this model (one card per semantic model)
    const modelWarnings = (DATA.semanticWarnings || []).filter(w => w.model === modelName);
    const modelSM = fileSM.filter(sm => sm.modelRef === modelName);
    const allMetrics = fileMetrics;
    for (const sm of modelSM) {
      const smKey = 'semantic:' + sm.name + ':' + modelName;
      if (!matchFilter(smKey, 'semantic')) continue;
      // Filter metrics belonging to this semantic model
      const smMetrics = allMetrics.filter(mt => mt.semanticModel === sm.name);
      // Build measure→metric lookup for this semantic model
      const measureToMetrics = {};
      smMetrics.forEach(mt => {
        if (mt.measure && mt.type !== 'derived') {
          if (!measureToMetrics[mt.measure]) measureToMetrics[mt.measure] = [];
          measureToMetrics[mt.measure].push(mt);
        }
      });
      const derivedMetrics = smMetrics.filter(mt => mt.type === 'derived');

      h += '<div class="card" data-review-key="' + esc(smKey) + '" onclick="focusCard(this)" style="border-color:var(--cy);' + cardBorderStyle(smKey) + '">';
      h += '<div class="card-head with-border"><div style="display:flex;align-items:center;gap:8px">';
      h += '<span class="badge" style="color:var(--cy);background:var(--cyb)">Semantic Layer</span>';
      h += '<span class="card-name">' + esc(sm.name) + '</span>';
      h += '</div>' + renderReviewBtns(smKey) + '</div>';

      // Description
      if (sm.description) {
        h += '<div style="padding:4px 18px 8px;font-size:12px;color:var(--txd)">' + esc(sm.description) + '</div>';
      }

      // defaults.agg_time_dimension
      if (sm.defaults && sm.defaults.agg_time_dimension) {
        h += '<div style="padding:4px 18px 6px;display:flex;align-items:center;gap:6px">';
        h += '<span style="font-size:11px;font-family:var(--fn);font-weight:600;color:var(--txm)">agg_time_dimension</span>';
        h += '<span style="font-size:11px;font-family:var(--fn);color:var(--cy)">' + esc(sm.defaults.agg_time_dimension) + '</span>';
        h += '</div>';
      }

      // --- ENTITIES section ---
      if (sm.entities.length) {
        h += '<div style="padding:10px 18px 2px;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.05em;text-transform:uppercase">Entities</div>';
        h += '<div style="padding:0 18px 8px;overflow-x:auto">';
        h += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
        h += '<thead><tr style="border-bottom:2px solid var(--bd)">';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">NAME</th>';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">EXPR</th>';
        h += '<th style="padding:6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">TYPE</th>';
        h += '</tr></thead><tbody>';
        sm.entities.forEach(e => {
          const typeColor = e.type === 'primary' ? 'var(--ac)' : e.type === 'foreign' ? 'var(--bl)' : 'var(--txm)';
          h += '<tr style="border-bottom:1px solid var(--bd)">';
          h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--pu);font-weight:600">' + esc(e.name) + '</td>';
          h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--txd);font-size:11px">' + esc(e.expr) + '</td>';
          h += '<td style="padding:5px 0"><span style="font-size:10px;font-family:var(--fn);font-weight:600;color:' + typeColor + ';text-transform:uppercase;letter-spacing:.03em">' + esc(e.type || '') + '</span></td>';
          h += '</tr>';
        });
        h += '</tbody></table></div>';
      }

      // --- MEASURES → METRICS section (merged view) ---
      if (sm.measures.length) {
        // Build metric rows: simple/cumulative metrics with their measure info
        const simpleMetrics = smMetrics.filter(mt => mt.type !== 'derived');
        const measureMap = {};
        sm.measures.forEach(m => { measureMap[m.name] = m; });

        // Metrics section (simple/cumulative)
        if (simpleMetrics.length) {
          h += '<div style="padding:10px 18px 2px;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.05em;text-transform:uppercase">Metrics</div>';
          h += '<div style="padding:0 18px 8px;overflow-x:auto">';
          h += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
          h += '<thead><tr style="border-bottom:2px solid var(--bd)">';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">METRIC</th>';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">LABEL</th>';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">MEASURE</th>';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">AGG</th>';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">EXPR</th>';
          h += '<th style="padding:6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">DESCRIPTION</th>';
          h += '</tr></thead><tbody>';
          simpleMetrics.forEach(mt => {
            const m = measureMap[mt.measure] || {};
            // Collect conditions: filter, measureFilter, other typeParams
            const conditions = [];
            if (mt.filter) conditions.push({ key: 'filter', val: mt.filter });
            if (mt.measureFilter) conditions.push({ key: 'measure filter', val: mt.measureFilter });
            if (mt.typeParams) {
              for (const [k, v] of Object.entries(mt.typeParams)) {
                conditions.push({ key: k, val: typeof v === 'object' ? JSON.stringify(v) : String(v) });
              }
            }
            h += '<tr style="border-bottom:1px solid var(--bd)">';
            h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--cy);font-weight:600">' + esc(mt.name) + '</td>';
            h += '<td style="padding:5px 12px 5px 0;color:var(--tx)">' + esc(mt.label || '') + '</td>';
            h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--txd);font-size:11px">' + esc(mt.measure || '') + '</td>';
            h += '<td style="padding:5px 12px 5px 0"><span style="font-size:10px;font-family:var(--fn);padding:1px 5px;border-radius:3px;background:var(--bg2,var(--s1));color:var(--txm)">' + esc(m.agg || '') + '</span></td>';
            h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--txd);font-size:11px">' + esc(m.expr || '') + '</td>';
            h += '<td style="padding:5px 0;color:var(--txd);font-size:11px">' + esc(mt.description || '') + '</td>';
            h += '</tr>';
            // Render conditions as sub-row
            if (conditions.length) {
              h += '<tr style="border-bottom:1px solid var(--bd)">';
              h += '<td colspan="6" style="padding:2px 12px 6px 24px">';
              conditions.forEach(c => {
                h += '<div style="display:flex;gap:6px;align-items:baseline;font-size:11px;padding:1px 0">';
                h += '<span style="font-family:var(--fn);font-weight:600;color:var(--or);white-space:nowrap">' + esc(c.key) + ':</span>';
                h += '<span style="font-family:var(--fn);color:var(--txd);word-break:break-all">' + esc(c.val) + '</span>';
                h += '</div>';
              });
              h += '</td></tr>';
            }
          });
          h += '</tbody></table></div>';
        }

        // Orphan measures (not referenced by any metric)
        const referencedMeasures = new Set(smMetrics.map(mt => mt.measure).filter(Boolean));
        const orphanMeasures = sm.measures.filter(m => !referencedMeasures.has(m.name));
        if (orphanMeasures.length) {
          h += '<div style="padding:10px 18px 2px;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--or);letter-spacing:.05em;text-transform:uppercase">Measures without Metrics</div>';
          h += '<div style="padding:0 18px 8px;overflow-x:auto">';
          h += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
          h += '<thead><tr style="border-bottom:2px solid var(--bd)">';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">MEASURE</th>';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">AGG</th>';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">EXPR</th>';
          h += '<th style="padding:6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">DESCRIPTION</th>';
          h += '</tr></thead><tbody>';
          orphanMeasures.forEach(m => {
            h += '<tr style="border-bottom:1px solid var(--bd)">';
            h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--or);font-weight:600">' + esc(m.name) + '</td>';
            h += '<td style="padding:5px 12px 5px 0"><span style="font-size:10px;font-family:var(--fn);padding:1px 5px;border-radius:3px;background:var(--bg2,var(--s1));color:var(--txm)">' + esc(m.agg || '') + '</span></td>';
            h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--txd);font-size:11px">' + esc(m.expr || '') + '</td>';
            h += '<td style="padding:5px 0;color:var(--txd);font-size:11px">' + esc(m.description || '') + '</td>';
            h += '</tr>';
          });
          h += '</tbody></table></div>';
        }

        // No metrics defined at all — show raw measures
        if (!simpleMetrics.length && !derivedMetrics.length && sm.measures.length) {
          h += '<div style="padding:10px 18px 2px;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.05em;text-transform:uppercase">Measures</div>';
          h += '<div style="padding:0 18px 8px;overflow-x:auto">';
          h += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
          h += '<thead><tr style="border-bottom:2px solid var(--bd)">';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">MEASURE</th>';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">AGG</th>';
          h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">EXPR</th>';
          h += '<th style="padding:6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">DESCRIPTION</th>';
          h += '</tr></thead><tbody>';
          sm.measures.forEach(m => {
            h += '<tr style="border-bottom:1px solid var(--bd)">';
            h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--cy);font-weight:600">' + esc(m.name) + '</td>';
            h += '<td style="padding:5px 12px 5px 0"><span style="font-size:10px;font-family:var(--fn);padding:1px 5px;border-radius:3px;background:var(--bg2,var(--s1));color:var(--txm)">' + esc(m.agg || '') + '</span></td>';
            h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--txd);font-size:11px">' + esc(m.expr || '') + '</td>';
            h += '<td style="padding:5px 0;color:var(--txd);font-size:11px">' + esc(m.description || '') + '</td>';
            h += '</tr>';
          });
          h += '</tbody></table></div>';
        }
      }

      // --- DERIVED METRICS section ---
      if (derivedMetrics.length) {
        h += '<div style="padding:10px 18px 2px;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.05em;text-transform:uppercase">Derived Metrics</div>';
        h += '<div style="padding:0 18px 8px;overflow-x:auto">';
        h += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
        h += '<thead><tr style="border-bottom:2px solid var(--bd)">';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">NAME</th>';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">LABEL</th>';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">FORMULA</th>';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">REFERENCES</th>';
        h += '<th style="padding:6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">DESCRIPTION</th>';
        h += '</tr></thead><tbody>';
        derivedMetrics.forEach(mt => {
          h += '<tr style="border-bottom:1px solid var(--bd)">';
          h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--cy);font-weight:600">' + esc(mt.name) + '</td>';
          h += '<td style="padding:5px 12px 5px 0;color:var(--tx)">' + esc(mt.label || '') + '</td>';
          h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--txd);font-size:11px">' + esc(mt.expr || '') + '</td>';
          h += '<td style="padding:5px 12px 5px 0">' + (mt.metrics || []).map(r => '<span style="font-size:10px;font-family:var(--fn);padding:1px 5px;border-radius:3px;background:var(--pub);color:var(--pu)">' + esc(r) + '</span>').join(' ') + '</td>';
          h += '<td style="padding:5px 0;color:var(--txd);font-size:11px">' + esc(mt.description || '') + '</td>';
          h += '</tr>';
        });
        h += '</tbody></table></div>';
      }

      // --- DIMENSIONS section ---
      if (sm.dimensions.length) {
        h += '<div style="padding:10px 18px 2px;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.05em;text-transform:uppercase">Dimensions</div>';
        h += '<div style="padding:0 18px 8px;overflow-x:auto">';
        h += '<table style="width:100%;border-collapse:collapse;font-size:12px">';
        h += '<thead><tr style="border-bottom:2px solid var(--bd)">';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">NAME</th>';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">EXPR</th>';
        h += '<th style="padding:6px 12px 6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">TYPE</th>';
        h += '<th style="padding:6px 0;text-align:left;font-size:10px;font-weight:700;font-family:var(--fn);color:var(--txm);letter-spacing:.03em">DESCRIPTION</th>';
        h += '</tr></thead><tbody>';
        sm.dimensions.forEach(d => {
          const typeColor = d.type === 'time' ? 'var(--or)' : 'var(--txm)';
          h += '<tr style="border-bottom:1px solid var(--bd)">';
          h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--bl);font-weight:600">' + esc(d.name) + '</td>';
          h += '<td style="padding:5px 12px 5px 0;font-family:var(--fn);color:var(--txd);font-size:11px">' + esc(d.expr) + '</td>';
          const granularity = d.typeParams && d.typeParams.time_granularity ? ' <span style="opacity:.6;font-weight:400">(' + esc(d.typeParams.time_granularity) + ')</span>' : '';
          h += '<td style="padding:5px 12px 5px 0"><span style="font-size:10px;font-family:var(--fn);font-weight:600;color:' + typeColor + ';text-transform:uppercase;letter-spacing:.03em">' + esc(d.type || '') + granularity + '</span></td>';
          h += '<td style="padding:5px 0;color:var(--txd);font-size:11px">' + esc(d.description || '') + '</td>';
          h += '</tr>';
        });
        h += '</tbody></table></div>';
      }

      // Warnings for this semantic model
      const smWarnings = modelWarnings.filter(w => !w.semanticModel || w.semanticModel === sm.name);
      if (smWarnings.length) {
        h += '<div style="padding:8px 18px;border-top:1px solid var(--bd);background:var(--orb)">';
        smWarnings.forEach(w => {
          h += '<div style="padding:3px 0;font-size:12px;color:var(--or)">\u26A0 ' + esc(w.hint) + '</div>';
        });
        h += '</div>';
      }

      // Raw YAML button (open in right panel)
      if (sm.sourceFile && (DATA.fileContents || {})[sm.sourceFile]) {
        h += '<div style="padding:8px 18px;display:flex;justify-content:flex-end">';
        h += '<button class="raw-btn" onclick="event.stopPropagation();openSourcePanel(' + jsStr(sm.sourceFile) + ')">\u2630 YAML</button>';
        h += '</div>';
      }

      h += renderComment(smKey);
      h += '</div>';
    }
    // Orphan warnings (not tied to a specific semantic model)
    if (!modelSM.length && modelWarnings.length) {
      h += '<div class="card" style="border-color:var(--cy)">';
      h += '<div class="card-head with-border"><div style="display:flex;align-items:center;gap:8px">';
      h += '<span class="badge" style="color:var(--cy);background:var(--cyb)">Semantic Layer</span>';
      h += '</div></div>';
      h += '<div style="padding:8px 18px;background:var(--orb)">';
      modelWarnings.forEach(w => {
        h += '<div style="padding:3px 0;font-size:12px;color:var(--or)">\u26A0 ' + esc(w.hint) + '</div>';
      });
      h += '</div>';
      h += '</div>';
    }

    h += '</div></div>';
  }

  if (!Object.keys(models).length) h += '<div style="text-align:center;padding:40px;color:var(--txm)">No matching items</div>';


  h += renderExportPanel(stats);
  h += '</div>'; // close content padding wrapper
  document.getElementById('app').innerHTML = h;
  renderSidebar();
}

function renderExportPanel(stats) {
  const hasReviews = Object.values(reviews).some(r => r !== 'pending') || Object.values(comments).some(c => c?.trim());
  let h = '<div class="export-panel">';
  h += '<div class="export-head"><div>';
  h += '<div style="font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px"><span style="font-size:16px">\u2318</span> Export to Claude Code</div>';
  h += '<div style="font-size:12px;color:var(--txd);margin-top:2px">Copy review results as a prompt for Claude Code</div>';
  h += '</div><div style="display:flex;gap:8px;align-items:center">';
  h += '<span style="font-size:12px;color:var(--txd)">Reviewed: ' + (stats.approved + stats.needs_change) + '/' + stats.total + '</span>';
  if (stats.needs_change > 0) h += '<span class="badge" style="color:var(--rd);background:var(--rdb)">Needs Change ' + stats.needs_change + '</span>';
  h += '</div></div>';
  h += '<div class="export-body">';
  if (!hasReviews) {
    h += '<div style="color:var(--txm);font-size:13px;text-align:center;padding:12px">Review tests and add comments to generate a prompt here</div>';
  } else {
    h += '<button class="preview-btn" onclick="togglePreview()"><span>Preview</span><span id="preview-arrow">\u25BC</span></button>';
    h += '<pre class="preview-pre" id="preview-content" style="display:none"></pre>';
    h += '<button class="copy-btn" id="copy-btn" onclick="copyPrompt()">\uD83D\uDCCB Copy Prompt</button>';
    h += '<div style="margin-top:12px;font-size:11px;color:var(--txm);line-height:1.6">';
    h += 'After copying, launch <code style="font-family:var(--fn);color:var(--cy);background:var(--cyb);padding:1px 6px;border-radius:3px">claude</code> in your terminal and paste';
    h += '</div>';
  }
  h += '</div></div>';
  return h;
}

function generatePrompt() {
  const tests = DATA.allTests;
  const coverage = DATA.coverageData || [];
  const items = [];
  const seenKeys = new Set();

  tests.forEach(t => {
    const key = reviewKey(t);
    if (seenKeys.has(key)) return;
    seenKeys.add(key);
    const status = reviews[key], comment = (comments[key] || '').trim();
    if (status === 'pending' && !comment) return;
    const sl = status === 'approved' ? 'OK' : status === 'needs_change' ? 'Needs Change' : 'Pending';
    let entry = '[' + sl + '] ' + t.type.toUpperCase() + ': ' + t.name;
    if (t.sourceFile) entry += ' (' + t.sourceFile + ')';
    if (t.model) entry += ' \u2192 ' + t.model;
    if (t.column && t.column !== '(model-level)') entry += '.' + t.column;
    if (comment) entry += '\n  Comment: ' + comment;
    if (t.type === 'unit' && status === 'needs_change') {
      t.given.forEach(g => entry += '\n  given ' + g.input + ': ' + JSON.stringify(g.rows));
      entry += '\n  expect: ' + JSON.stringify(t.expect);
    }
    items.push(entry);
  });

  // Include untested column reviews
  coverage.forEach(cov => {
    cov.columns.filter(c => c.status === 'untested').forEach(c => {
      const key = 'col:' + cov.model + ':' + c.name;
      if (seenKeys.has(key)) return;
      seenKeys.add(key);
      const status = reviews[key], comment = (comments[key] || '').trim();
      if (status === 'pending' && !comment) return;
      const sl = status === 'approved' ? 'OK' : status === 'needs_change' ? 'Needs Change' : 'Pending';
      let entry = '[' + sl + '] UNTESTED COLUMN: ' + cov.model + '.' + c.name;
      if (comment) entry += '\n  Comment: ' + comment;
      items.push(entry);
    });
  });

  // Include semantic model reviews
  (DATA.semanticModels || []).forEach(sm => {
    const key = 'semantic:' + sm.name + ':' + sm.modelRef;
    if (seenKeys.has(key)) return;
    seenKeys.add(key);
    const status = reviews[key], comment = (comments[key] || '').trim();
    if (status === 'pending' && !comment) return;
    const sl = status === 'approved' ? 'OK' : status === 'needs_change' ? 'Needs Change' : 'Pending';
    let entry = '[' + sl + '] SEMANTIC MODEL: ' + sm.name + ' (model: ' + sm.modelRef + ')';
    if (comment) entry += '\n  Comment: ' + comment;
    items.push(entry);
  });

  if (!items.length) return '';
  const nf = Object.values(reviews).filter(r => r === 'needs_change').length;
  const ap = Object.values(reviews).filter(r => r === 'approved').length;
  const total = Object.keys(reviews).length;
  let p = 'dbt test review results.\nReviewed: ' + (ap + nf) + '/' + total + ' (OK: ' + ap + ', Needs Change: ' + nf + ')\n\n';
  p += items.join('\n\n');

  if (coverage.length) {
    p += '\n\n## Coverage\n';
    coverage.forEach(c => {
      p += c.model + ': ' + c.coveragePercent + '% (' + c.tested + ' tested, ' + c.excluded + ' excluded, ' + c.untested + ' untested)\n';
      c.columns.filter(col => col.status === 'untested').forEach(col => {
        p += '  Untested: ' + col.name + '\n';
      });
    });
  }

  if (nf > 0) p += '\n\nPlease fix the tests marked as "Needs Change" based on the review comments.';
  return p;
}

window.setReview = function(key, status) { reviews[key] = status; render(); };
window.setComment = function(key, val) { comments[key] = val; };
window.setFilter = function(f) { filter = f; render(); };
window.toggleSection = function(id) {
  if (openSections[id] === undefined) {
    // Coverage sections (cov_*) default closed, all others default open
    openSections[id] = id.startsWith('cov_') ? true : false;
  } else {
    openSections[id] = !openSections[id];
  }
  render();
};
window.togglePreview = function() {
  const el = document.getElementById('preview-content');
  const arrow = document.getElementById('preview-arrow');
  if (el.style.display === 'none') { el.style.display = 'block'; el.textContent = generatePrompt(); arrow.textContent = '\u25B2'; }
  else { el.style.display = 'none'; arrow.textContent = '\u25BC'; }
};
window.copyPrompt = async function() {
  const text = generatePrompt();
  const btn = document.getElementById('copy-btn');
  try { await navigator.clipboard.writeText(text); } catch {
    const ta = document.createElement('textarea'); ta.value = text;
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    if (!ok) { btn.textContent = 'Copy failed'; setTimeout(() => { btn.textContent = '\uD83D\uDCCB Copy Prompt'; }, 2000); return; }
  }
  btn.textContent = '\u2713 Copied!'; btn.classList.add('copied');
  setTimeout(() => { btn.textContent = '\uD83D\uDCCB Copy Prompt'; btn.classList.remove('copied'); }, 2000);
};


let focusedCardIndex = -1;
const getReviewCards = () => [...document.querySelectorAll('.card[data-review-key]')];

window.focusCard = function(el) {
  const cards = getReviewCards();
  const idx = cards.indexOf(el.closest('.card[data-review-key]'));
  if (idx === -1) return;
  focusedCardIndex = idx;
  cards.forEach(c => c.classList.remove('focused'));
  cards[focusedCardIndex].classList.add('focused');
};

document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  const cards = getReviewCards();
  if (e.key === '?' || e.key === '/') {
    const help = document.getElementById('kbd-help');
    if (help) help.style.display = help.style.display === 'none' ? 'block' : 'none';
    return;
  }
  if (e.key === 'b') { toggleSidebarCollapse(); return; }
  if (e.key === 'e') { const rp = document.getElementById('right-panel'); if (rp) { if (rp.classList.contains('open')) { closeRightPanel(); } else { const cteR = DATA.cteResults || {}; const cteFile = Object.keys(cteR)[0]; if (cteFile) { openCTEPanel(cteFile); } else { const fc = DATA.fileContents || {}; const srcFile = Object.keys(fc)[0]; if (srcFile) openSourcePanel(srcFile); } } } return; }
  if (!cards.length) return;
  if (e.key === 'j') {
    focusedCardIndex = Math.min(focusedCardIndex + 1, cards.length - 1);
    cards.forEach(c => c.classList.remove('focused'));
    cards[focusedCardIndex].classList.add('focused');
    cards[focusedCardIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else if (e.key === 'k') {
    focusedCardIndex = Math.max(focusedCardIndex - 1, 0);
    cards.forEach(c => c.classList.remove('focused'));
    cards[focusedCardIndex].classList.add('focused');
    cards[focusedCardIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else if (e.key === '1' && focusedCardIndex >= 0 && focusedCardIndex < cards.length) {
    const key = cards[focusedCardIndex].dataset.reviewKey;
    if (key) setReview(key, 'approved');
  } else if (e.key === '2' && focusedCardIndex >= 0 && focusedCardIndex < cards.length) {
    const key = cards[focusedCardIndex].dataset.reviewKey;
    if (key) setReview(key, 'needs_change');
  } else if (e.key === '3' && focusedCardIndex >= 0 && focusedCardIndex < cards.length) {
    const key = cards[focusedCardIndex].dataset.reviewKey;
    if (key) setReview(key, 'pending');
  }
});

init();
</script></body></html>
